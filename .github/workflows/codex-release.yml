name: Release Notes

# On a version tag (v*), publish a GitHub Release. When the OPENAI_API_KEY secret
# is set, Codex drafts polished user-facing notes; otherwise the release still
# ships with GitHub's built-in auto-generated notes (deterministic fallback, no
# API key required). The Codex layer is an upgrade, not a hard dependency.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Draft release notes with Codex
        id: codex
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        continue-on-error: true   # fall back to auto-notes if Codex fails
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-file: RELEASE_NOTES.md
          prompt: |
            Write concise, user-facing release notes for pyinsyde
            ${{ github.ref_name }}. Determine the previous tag with
            `git describe --tags --abbrev=0 HEAD^` (it may not exist), then read
            `git log <prev>..HEAD --pretty=format:'%s'`. Group changes under
            **Added**, **Changed**, and **Fixed** headings (omit empty groups).
            Output plain markdown only — no preamble, no code fences around the
            whole thing. If there is no previous tag, summarize the initial release.

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s RELEASE_NOTES.md ]; then
            echo "Publishing with Codex-drafted notes."
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file RELEASE_NOTES.md
          else
            echo "No Codex notes (secret unset or step skipped) — using GitHub auto-generated notes."
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi
